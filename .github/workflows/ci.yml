name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AIWN_JWT_SECRET_KEY: test-secret-for-ci-only
      AIWN_DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      AIWN_REDIS_URL: "redis://localhost:6379"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/ --select E,F,I

      - name: Test
        run: pytest tests/ -x -q
